<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Diamond Taxi | Retro City</title>
  <meta name="description" content="Offizielle Unternehmensseite von Diamond Taxi in Retro City – Leitung, Standort, Unternehmen, Team und Kontakt für Fragen, Beschwerden und Bewerbungen." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #060606;
      --bg-2: #0e0e0f;
      --panel: rgba(18, 18, 20, 0.92);
      --panel-soft: rgba(255, 210, 48, 0.06);
      --line: rgba(255, 213, 74, 0.18);
      --text: #f5f5f2;
      --muted: #b7b7b0;
      --gold: #ffd84a;
      --gold-strong: #ffbf00;
      --gold-soft: #fff2b0;
      --shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
      --radius-xl: 28px;
      --radius-lg: 22px;
      --radius-md: 16px;
      --max: 1240px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: 'Outfit', system-ui, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top right, rgba(255, 191, 0, 0.12), transparent 25%),
        radial-gradient(circle at top left, rgba(255, 216, 74, 0.08), transparent 20%),
        linear-gradient(180deg, #050505 0%, #0a0a0b 45%, #050505 100%);
      line-height: 1.6;
      overflow-x: hidden;
    }

    a { color: inherit; text-decoration: none; }
    img { max-width: 100%; display: block; }

    .container {
      width: min(calc(100% - 32px), var(--max));
      margin: 0 auto;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 1000;
      backdrop-filter: blur(18px);
      background: rgba(5, 5, 5, 0.84);
      border-bottom: 1px solid rgba(255, 216, 74, 0.12);
    }

    .nav {
      min-height: 86px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 16px;
      min-width: 0;
    }

    .brand img {
      width: 68px;
      height: 68px;
      object-fit: contain;
      filter: drop-shadow(0 12px 25px rgba(255, 191, 0, 0.22));
    }

    .brand-text strong {
      display: block;
      font-size: 1.15rem;
      letter-spacing: 0.02em;
    }

    .brand-text span {
      color: var(--muted);
      font-size: 0.9rem;
    }

    .nav-links {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 10px;
</html>
